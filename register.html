<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System - Register</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body class="layout-login">

    <header>
        <h1>STUDENT MANAGEMENT SYSTEM</h1>
    </header>

    <main>
        <div class="login-container">
            
            <div class="profile-pic-placeholder"></div>
            
            <h2 class="login-title">Register</h2>
            
            <hr>
            
            <form action="login.html" method="POST">
                
                <div class="form-group">
                    <label for="username">User Name</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="reenter-password">Reenter Password</label>
                    <input type="password" id="reenter-password" name="reenter-password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Sign Up</button>
                
            </form>

            <hr>

        </div>
    </main>

    <footer></footer>

</body>
</html>
