<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System - Complaints</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body class="layout-dashboard">

    <input type="checkbox" id="menu-toggle">

    <header>
        <label for="menu-toggle" class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
        </label>
    </header>

    <nav class="dropdown-menu">
        <ul class="menu-list">
            <li><a href="dashboard.html">Home</a></li>
            <li><a href="profile.html">My Profile</a></li>
            <li><a href="#">Settings</a></li>
            <li><a href="login.html">Log Out</a></li>
        </ul>
    </nav>

    <main>
        <div class="complaints-layout-wrapper">
            
            <div class="top-actions card">
                <div class="title-group">
                    <a href="dashboard.html" class="home-icon-link">
                        <svg class="home-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    </a>
                    <h1 class="page-title">Student Complaints</h1>
                </div>
                
                <div class="action-buttons">
                    <button type="button" class="btn-solid">Search Complaint</button>
                    <button type="button" class="btn-solid">Filter Complaints</button>
                </div>
            </div>

            <div class="complaints-list">
                
                <div class="card complaint-card" onclick="window.location.href='complaint_details.html'">
                    <div class="complaint-content-left">
                        <div class="complaint-number">1</div>
                        <div class="complaint-details">
                            <span>Student ID: 202600001</span>
                            <span>Subject: Grades Inquiry</span>
                        </div>
                    </div>
                    <div class="complaint-content-right">
                        <button type="button" class="btn-solid btn-resolve" onclick="event.stopPropagation(); alert('Complaint Resolved!');">Mark Resolved</button>
                    </div>
                </div>

                <div class="card complaint-card" onclick="window.location.href='complaint_details.html'">
                    <div class="complaint-content-left">
                        <div class="complaint-number">2</div>
                        <div class="complaint-details">
                            <span>Student ID: 202600002</span>
                            <span>Subject: Late Activity</span>
                        </div>
                    </div>
                    <div class="complaint-content-right">
                        <button type="button" class="btn-solid btn-resolve" onclick="event.stopPropagation(); alert('Complaint Resolved!');">Mark Resolved</button>
                    </div>
                </div>

                <div class="card complaint-card" onclick="window.location.href='complaint_details.html'">
                    <div class="complaint-content-left">
                        <div class="complaint-number">3</div>
                        <div class="complaint-details">
                            <span>Student ID: 202600003</span>
                            <span>Subject: Skipped Exams</span>
                        </div>
                    </div>
                    <div class="complaint-content-right">
                        <button type="button" class="btn-solid btn-resolve" onclick="event.stopPropagation(); alert('Complaint Resolved!');">Mark Resolved</button>
                    </div>
                </div>

                <div class="card complaint-card" onclick="window.location.href='complaint_details.html'">
                    <div class="complaint-content-left">
                        <div class="complaint-number">4</div>
                        <div class="complaint-details">
                            <span>Student ID: 202600004</span>
                            <span>Subject: Absence due to Health</span>
                        </div>
                    </div>
                    <div class="complaint-content-right">
                        <button type="button" class="btn-solid btn-resolve" onclick="event.stopPropagation(); alert('Complaint Resolved!');">Mark Resolved</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer></footer>

</body>
</html>
